  </head>

    <body>
      <div
      style="
        background-color: rgb(24, 24, 59);
        margin: auto;
        height: calc(100vh / 8);
        margin-bottom: calc(100vh / 8);
      "
      id="heading-container"
    >
      <h1
        style="
          padding-top: 10px;
          padding-bottom: 10px;
          margin: auto;
          font-family: monospace;
          color: white;
          font-size: calc(100vh / 12);
          margin-bottom: calc(100vh / 32);
          text-align: center;
        "
        id="heading"
      >
        Sam's Games
      </h1>
      <a href="https://www.samchandler.co.uk/">
        <button
          style="
            width: calc(100vw / 12);
            height: calc(100vh / 12);
            margin: auto;
            font-size: calc(100vw / 32);
            font-family: monospace;
            background-color: rgb(201, 201, 253);
  
          "
          id="home-button"
        >
          Home
        </button>
      </a>
    </div>
    <h2 id="score-message">Your score:</h2>
    <h2 id="score">0</h2>
    <h2 id="time-left-message">Time left:</h2>
    <h2 id="time-left">60</h2>
    <div class="grid">
      <div class="square" id="1"></div>
      <div class="square" id="2"></div>
      <div class="square" id="3"></div>
      <div class="square" id="4"></div>
      <div class="square" id="5"></div>
      <div class="square" id="6"></div>
      <div class="square" id="7"></div>
      <div class="square" id="8"></div>
      <div class="square" id="9"></div>
    </div>
    <button id="pause-button" onclick="pauseGame()">Pause</button>
    <script src="script.js"></script>
  </body>
